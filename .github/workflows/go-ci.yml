name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false 

      - name: Build
        run: go build -v ./...

      - name: Run Tests
        run: go test -v -race ./internal/... -coverprofile=coverage.txt -covermode=atomic

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
